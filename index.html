<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;
}

body{
    background:rgba(0,0,0,0);
}

#memo{

    width:100%;
    height:100%;

    padding:22px;

    background:transparent;
    border:none;
    outline:none;
    resize:none;

    font-family:'Patrick Hand',cursive;

    font-size:34px;

    line-height:1.45;

    color:#FAFAF8;

    caret-color:white;

    letter-spacing:1px;

    /* เอฟเฟกต์ชอล์ก */

    text-shadow:

        0 0 1px rgba(255,255,255,.95),

        0 0 2px rgba(255,255,255,.85),

        0 0 4px rgba(255,255,255,.55),

        1px 1px 0 rgba(255,255,255,.18),

        -1px -1px 0 rgba(255,255,255,.10),

        0 0 14px rgba(255,255,255,.12);

    filter:
        contrast(108%)
        brightness(103%);

}

#memo::placeholder{

    color:rgba(255,255,255,.28);

}

#memo::-webkit-scrollbar{
    width:8px;
}

#memo::-webkit-scrollbar-thumb{
    background:rgba(255,255,255,.15);
    border-radius:20px;
}

</style>
</head>

<body>

<textarea
id="memo"
spellcheck="false"
placeholder="✎ Write something..."></textarea>

<script>

const memo=document.getElementById("memo");

memo.value=localStorage.getItem("chalkMemo")||"";

memo.addEventListener("input",()=>{

    localStorage.setItem("chalkMemo",memo.value);

});

</script>

</body>
</html>
